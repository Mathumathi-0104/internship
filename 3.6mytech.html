<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tech Stack</title>
    <style>
        body {
            background: #06485a;
            font-family: Arial, sans-serif;
            color: white;
            margin: 2px;
            padding: 30px;
        }
        h1 {
            text-align: center;
            margin-bottom: 50px;
            color: #ddc4f0;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            font-weight: bold;
        }
        .tab {
            padding: 12px 25px;
            background:#111827;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab.active {
            background: #fa994a;
        }
        .container {
            display: grid;
            grid-template-columns:repeat(4,1fr);
            gap: 20px;
        }
        .card {
            background: #93b3a5;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
        }
        .card img {
            width: 100px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 20px;
        }
        .card h2 {
            font-size: 25px;
            margin: 10px 0;
            color: rgb(78, 20, 9);
        }
    </style>
</head>
<body>
    <h1>My <span>Tech Stack</span></h1>
    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active">All (25)</div>
        <div class="tab">Languages (7)</div>
        <div class="tab">Tools (8)</div>
        <div class="tab">Libraries (5)</div>
        <div class="tab">Databases (4)</div>
    </div>
    <div class="container">
        <div class="card">
            <img src="Images/c.png">
            <h2>C</h2>
        </div>
        <div class="card">
            <img src="Images/c++.jpeg">
            <h2>C++</h2>
        </div>
        <div class="card">
            <img src="Images/python.png">
            <h2>Python</h2>
        </div>
        <div class="card">
            <img src="Images/java.png">
            <h2>Java</h2>
        </div>
        <div class="card">
            <img src="Images/html.jpeg">
            <h2>HTML</h2>
        </div>
        <div class="card">
            <img src="Images/css.svg">
            <h2>CSS</h2>
        </div>
        <div class="card">
            <img src="Images/react1.png">
            <h2>React</h2>
        </div>
        <div class="card">
            <img src="Images/mySQL.png">
            <h2>MySQL</h2>
        </div>
    </div>
</body>
</html>
